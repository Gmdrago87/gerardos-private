<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Explorador de repositorios GitHub con barra de búsqueda flotante, filtros por lenguaje y grid responsivo.">
    <meta name="theme-color" content="#8b5cf6">
    <meta name="author" content="GerardMaestre">
    <title>RepoManager — Repositorios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://api.github.com">
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.400.0/dist/umd/lucide.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js" defer></script>
    <link rel="stylesheet" href="/style.css">
    <script type="module" src="/app.js"></script>
</head>

<body>
    <main class="web-main" id="repos-page">
        <div class="web-content">
            <div class="web-content__container">
                <section id="repositorios" class="search-wrapper animate-on-scroll stagger-1">
                    <div class="glass-search-bar glass-panel">
                        <div class="search-form">
                            <div class="search-row">
                                <div class="search-field">
                                    <i data-lucide="search" class="search-field__icon"></i>
                                    <input type="text" id="search-input" aria-label="Buscar proyectos"
                                        placeholder="Buscar proyectos por nombre, lenguaje o descripción...">
                                </div>
                                <button id="toggle-filters-btn" class="btn-filter" title="Mostrar/Ocultar Filtros">
                                    <i data-lucide="sliders-horizontal"></i>
                                </button>
                                <button id="refresh-data-btn" class="btn-refresh"
                                    title="Refrescar datos desde GitHub API" onclick="forceRefreshData()">
                                    <i data-lucide="refresh-cw"></i>
                                    <span class="btn-refresh__label">Refrescar</span>
                                </button>
                            </div>
                            <div id="data-source-indicator" class="data-source hidden">
                                <i data-lucide="info"></i>
                                <span id="data-source-text">Fuente de datos: API</span>
                                <span id="cache-age-text"></span>
                            </div>
                            <div id="filters-row" class="filters-row hidden">
                                <div class="sort-group">
                                    <span class="sort-group__label">Ordenar:</span>
                                    <button class="sort-btn active-sort" data-sort="updated"
                                        onclick="applySorting('updated')">
                                        <i data-lucide="clock"></i> Recientes
                                    </button>
                                    <button class="sort-btn" data-sort="stars" onclick="applySorting('stars')">
                                        <i data-lucide="star"></i> Estrellas
                                    </button>
                                    <button class="sort-btn" data-sort="forks" onclick="applySorting('forks')">
                                        <i data-lucide="git-fork"></i> Forks
                                    </button>
                                    <button class="sort-btn" data-sort="name" onclick="applySorting('name')">
                                        <i data-lucide="arrow-down-a-z"></i> A-Z
                                    </button>
                                </div>
                                <div class="language-group scrollbar-hide" id="filter-container">
                                    <button class="filter-btn filter-btn--active" data-filter="all"
                                        onclick="filterByLang('all', this)">
                                        Todos
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="repos-grid" id="repos-grid">
                </section>

                <div class="load-more-section">
                    <button id="load-more-btn" class="btn-load-more hidden">
                        <span class="btn-load-more__inner">
                            <i data-lucide="chevrons-down"></i>
                            Cargar más proyectos
                        </span>
                    </button>
                    <p id="showing-count" class="results-count"></p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
