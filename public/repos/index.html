<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Explorador de repositorios GitHub con barra de búsqueda flotante, filtros por lenguaje y grid responsivo.">
    <meta name="theme-color" content="#8b5cf6">
    <meta name="author" content="GerardMaestre">
    <title>RepoManager — Repositorios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://api.github.com">
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.400.0/dist/umd/lucide.min.js" defer></script>
    <script src="https://d3js.org/d3.v7.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js" defer></script>
    <link rel="stylesheet" href="/style.css">
    <script type="module" src="/app.js"></script>
</head>

<body>
    <header class="web-header animate-on-scroll">
        <div class="web-header__container">
            <div class="web-header__left">
                <div class="web-header__logo">
                    <i data-lucide="git-branch"></i>
                    <span class="web-header__logo-text">RepoManager</span>
                </div>
                <nav class="web-header__nav">
                    <a href="/index.html" class="web-header__nav-link">Inicio</a>
                    <a href="/repos/index.html" class="web-header__nav-link web-header__nav-link--active">Repositorios</a>
                    <a href="/workspace/index.html" class="web-header__nav-link">Entorno de Trabajo</a>
                </nav>
            </div>
            <div class="web-header__right">
                <a id="github-link-header" href="#" target="_blank" rel="noopener noreferrer"
                    class="web-header__github-btn">
                    <i data-lucide="github"></i>
                    <span id="username-header">Perfil</span>
                </a>
                <button id="logout-btn" class="web-header__icon-btn" title="Cerrar Sesión">
                    <i data-lucide="log-out"></i>
                </button>
                <button id="settings-btn" class="web-header__icon-btn" title="Ajustes">
                    <i data-lucide="settings"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="web-main" id="repos-page">
        <div id="loading" class="loading-screen">
            <div class="loading-content">
                <div class="loading-spinner">
                    <div class="spinner-ring spinner-ring--outer"></div>
                    <div class="spinner-ring spinner-ring--middle"></div>
                    <div class="spinner-ring spinner-ring--inner"></div>
                </div>
                <div class="loading-info">
                    <p id="loading-text" class="loading-label">
                        <span class="loading-gradient-text">Cargando Repositorios</span>
                    </p>
                    <p id="loading-status" class="loading-status">Obteniendo datos de IndexedDB...</p>
                    <div class="loading-dots">
                        <span class="loading-dot loading-dot--purple"></span>
                        <span class="loading-dot loading-dot--blue"></span>
                        <span class="loading-dot loading-dot--cyan"></span>
                    </div>
                </div>
            </div>
        </div>

        <div id="toast" class="toast hidden">
            <div class="toast__panel glass-panel">
                <div class="toast__content">
                    <div class="toast__icon-wrapper">
                        <i data-lucide="wifi-off"></i>
                    </div>
                    <div class="toast__text">
                        <p class="toast__title">Modo Caché</p>
                        <p class="toast__message">Datos almacenados localmente</p>
                    </div>
                    <button class="toast__close" onclick="document.getElementById('toast').classList.add('hidden')">
                        <i data-lucide="x"></i>
                    </button>
                </div>
            </div>
        </div>

        <button id="scroll-to-top" class="btn-scroll-top" aria-label="Volver arriba">
            <i data-lucide="arrow-up"></i>
        </button>

        <div class="web-content">
            <div class="web-content__container">
                <section id="repositorios" class="search-wrapper animate-on-scroll stagger-1">
                    <div class="glass-search-bar">
                        <div class="search-form">
                            <div class="search-row">
                                <div class="search-field">
                                    <i data-lucide="search" class="search-field__icon"></i>
                                    <input type="text" id="search-input" aria-label="Buscar proyectos"
                                        placeholder="Buscar proyectos por nombre, lenguaje o descripción...">
                                </div>
                                <button id="toggle-filters-btn" class="btn-filter" title="Mostrar/Ocultar Filtros">
                                    <i data-lucide="sliders-horizontal"></i>
                                </button>
                                <button id="refresh-data-btn" class="btn-refresh"
                                    title="Refrescar datos desde GitHub API" onclick="forceRefreshData()">
                                    <i data-lucide="refresh-cw"></i>
                                    <span class="btn-refresh__label">Refrescar</span>
                                </button>
                            </div>
                            <div id="data-source-indicator" class="data-source hidden">
                                <i data-lucide="info"></i>
                                <span id="data-source-text">Fuente de datos: API</span>
                                <span id="cache-age-text"></span>
                            </div>
                            <div id="filters-row" class="filters-row hidden">
                                <div class="sort-group">
                                    <span class="sort-group__label">Ordenar:</span>
                                    <button class="sort-btn active-sort" data-sort="updated"
                                        onclick="applySorting('updated')">
                                        <i data-lucide="clock"></i> Recientes
                                    </button>
                                    <button class="sort-btn" data-sort="stars" onclick="applySorting('stars')">
                                        <i data-lucide="star"></i> Estrellas
                                    </button>
                                    <button class="sort-btn" data-sort="forks" onclick="applySorting('forks')">
                                        <i data-lucide="git-fork"></i> Forks
                                    </button>
                                    <button class="sort-btn" data-sort="name" onclick="applySorting('name')">
                                        <i data-lucide="arrow-down-a-z"></i> A-Z
                                    </button>
                                </div>
                                <div class="language-group scrollbar-hide" id="filter-container">
                                    <button class="filter-btn filter-btn--active" data-filter="all"
                                        onclick="filterByLang('all', this)">
                                        Todos
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="repos-grid" id="repos-grid">
                </section>

                <div class="load-more-section">
                    <button id="load-more-btn" class="btn-load-more hidden">
                        <span class="btn-load-more__inner">
                            <i data-lucide="chevrons-down"></i>
                            Cargar más proyectos
                        </span>
                    </button>
                    <p id="showing-count" class="results-count"></p>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Ajustes -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-container">
            <div class="modal-header">
                <h2 class="modal-title">Ajustes</h2>
                <button class="modal-close"
                    onclick="document.getElementById('settings-modal').classList.add('hidden');">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="modal-body" style="padding: 2rem;">
                <div class="form-group">
                    <label class="form-label">Caché Local</label>
                    <button onclick="window.clearAppCache();" class="btn-submit"
                        style="width: 100%; background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.3); color: var(--error-400);">
                        <i data-lucide="database"></i> Borrar Caché
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Command Palette -->
    <div id="command-palette" class="command-palette hidden">
        <div class="palette-backdrop" onclick="document.getElementById('command-palette').classList.add('hidden');">
        </div>
        <div class="palette-container">
            <div class="search-form" style="border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding: 1rem;">
                <div class="search-field" style="width: 100%;">
                    <i data-lucide="search" class="search-field-icon"></i>
                    <input type="text" id="cmd-input" placeholder="Buscar repositorios o comandos...">
                </div>
            </div>
            <div id="palette-results" class="palette-results" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-content">
            <p class="footer-author">Diseñado y desarrollado por Gerard Maestre</p>
            <p class="footer-copyright">&copy; <span id="year"></span> RepoManager</p>
            <p id="footer-version" class="footer-version">v2.0.0</p>
        </div>
    </footer>
</body>

</html>
