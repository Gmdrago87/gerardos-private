name: PR Checks

on:
  pull_request:
    branches: [main]

# These checks are non-blocking and run on PRs
# They provide feedback but don't prevent merging

jobs:
  # Lint check for PRs
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run JavaScript linter
        run: npm run lint:js || echo "::warning:: JavaScript linting found issues"
        
      - name: Run CSS linter
        run: npm run lint:css || echo "::warning:: CSS linting found issues"

  # Build check for PRs
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build JavaScript
        run: npm run build:js
        
      - name: Build CSS
        run: npm run build:css

  # Lightweight secret scan for PRs (non-blocking)
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't fail the PR if secrets are found
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_EXIT_CODE: "1"
        continue-on-error: true
