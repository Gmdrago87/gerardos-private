name: CI

on:
  push:
    branches: [main, vibe/**]
  pull_request:
    branches: [main]

# This is the main CI workflow that runs on PRs
# It provides basic validation without blocking

jobs:
  # Basic validation
  validate:
    name: Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Verify no hardcoded secrets in tracked files
        run: |
          # Check for known secrets that were previously in the code
          # This should pass since we removed them all
          if grep -r "Ov23liZt2GrRqM6MBcHa\|05225febfd12ff3be4787a49b8cb69d1a1b85743\|super_secreto_para_probar_localmente" --include="*.js" --include="*.toml" --include="*.json" . 2>/dev/null; then
            echo "::error:: Hardcoded secrets found!"
            exit 1
          else
            echo "✓ No hardcoded secrets found"
          fi
