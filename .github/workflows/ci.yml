name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Simple CI workflow that validates basic functionality

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Check for secrets
        run: |
          echo "Checking for hardcoded secrets..."
          if grep -r "Ov23liZt2GrRqM6MBcHa" --include="*.js" --include="*.toml" --include="*.json" . 2>/dev/null; then
            echo "::error:: Found GitHub Client ID!"
            exit 1
          fi
          if grep -r "05225febfd12ff3be4787a49b8cb69d1a1b85743" --include="*.js" --include="*.toml" --include="*.json" . 2>/dev/null; then
            echo "::error:: Found GitHub Client Secret!"
            exit 1
          fi
          if grep -r "super_secreto_para_probar_localmente" --include="*.js" --include="*.toml" --include="*.json" . 2>/dev/null; then
            echo "::error:: Found JWT Secret!"
            exit 1
          fi
          echo "✓ No hardcoded secrets found"
