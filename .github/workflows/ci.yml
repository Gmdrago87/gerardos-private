name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests and build
        run: npm test

      - name: Check for secrets
        run: |
          echo "Checking for hardcoded secrets..."
          ID_PAT=$(echo "T3YyM2xpWnQyR3JScU02TUJjSGENCg==" | base64 -d | tr -d '\r\n')
          SEC_PAT=$(echo "MDUyMjVmZWJmZDEyZmYzYmU0Nzg3YTQ5YjhjYjY5ZDFhMWI4NTc0Mw0K" | base64 -d | tr -d '\r\n')
          JWT_PAT=$(echo "c3VwZXJfc2VjcmV0b19wYXJhX3Byb2Jhcl9sb2NhbG1lbnRlDQo=" | base64 -d | tr -d '\r\n')
          
          if grep -r "$ID_PAT" --include="*.js" --include="*.toml" --include="*.json" . 2>/dev/null; then
            echo "::error:: Found hardcoded GitHub Client ID!"
            exit 1
          fi
          if grep -r "$SEC_PAT" --include="*.js" --include="*.toml" --include="*.json" . 2>/dev/null; then
            echo "::error:: Found hardcoded GitHub Client Secret!"
            exit 1
          fi
          if grep -r "$JWT_PAT" --include="*.js" --include="*.toml" --include="*.json" . 2>/dev/null; then
            echo "::error:: Found hardcoded JWT Secret!"
            exit 1
          fi
          echo "✓ No hardcoded secrets found"
