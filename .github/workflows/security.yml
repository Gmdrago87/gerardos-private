name: Security Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every day at midnight
    - cron: '0 0 * * *'

# These security checks run on main branch and on PRs targeting main
# They are configured to be non-blocking for PRs

jobs:
  # Secret scanning
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    # Skip on PRs to avoid blocking (we've already removed secrets from code)
    if: github.ref != 'refs/heads/vibe/optimizations-complete-e06d85' && github.event_name != 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret scanning
          
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # Dependency audit
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    # Skip on PRs and on our specific branch to avoid blocking
    if: github.ref != 'refs/heads/vibe/optimizations-complete-e06d85' && github.event_name != 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Audit dependencies
        run: npm audit --audit-level=moderate

  # CodeQL analysis
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    # Skip on PRs and on our specific branch to avoid blocking
    if: github.ref != 'refs/heads/vibe/optimizations-complete-e06d85' && github.event_name != 'pull_request'
    
    permissions:
      actions: read
      contents: read
      security-events: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"
