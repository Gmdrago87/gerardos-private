name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

# Environment variables for deployment
env:
  NODE_VERSION: '20'

jobs:
  # Lint and test job (runs on every push to main)
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run JavaScript linter
        run: npm run lint:js || echo "::warning:: JavaScript linting found issues"
        
      - name: Run CSS linter
        run: npm run lint:css || echo "::warning:: CSS linting found issues"

  # Build job (runs on every push to main)
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build JavaScript
        run: npm run build:js
        
      - name: Build CSS
        run: npm run build:css
        
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: public/

  # Deploy job (only if build succeeds and secrets are available)
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: build
    
    # Only run if secrets are available
    if: ${{ 
      env.CLOUDFLARE_API_TOKEN != '' && 
      env.CLOUDFLARE_ACCOUNT_ID != ''
    }}
    
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: public/
          
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@1
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          projectName: gerardos-private
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
